name: Build Android TV APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Find ZIP
        run: |
          ZIP_PATH=$(find . -name "*.zip" | head -n 1)
          echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_ENV

      - name: Extract ZIP
        run: |
          rm -rf project
          mkdir project
          unzip -q "$ZIP_PATH" -d project

      - name: Find Android Project
        run: |
          ROOT_DIR=$(find project -name "settings.gradle*" | head -n 1 | xargs dirname)
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Fix Gradle config safely
        run: |
          cd "$ROOT_DIR"

          rm -f settings.gradle.kts build.gradle.kts app/build.gradle.kts

          printf "pluginManagement {\n    repositories {\n        google()\n        mavenCentral()\n        gradlePluginPortal()\n    }\n}\n\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)\n    repositories {\n        google()\n        mavenCentral()\n    }\n}\n\nrootProject.name = \"ChannelsDebridTV\"\ninclude ':app'\n" > settings.gradle

          printf "plugins {\n    id 'com.android.application' version '8.6.1' apply false\n    id 'org.jetbrains.kotlin.android' version '1.9.24' apply false\n}\n" > build.gradle

          printf "org.gradle.jvmargs=-Xmx4g\nandroid.useAndroidX=true\nandroid.enableJetifier=true\n" > gradle.properties

      - name: Ensure wrapper
        run: |
          cd "$ROOT_DIR"
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Build APK
        run: |
          cd "$ROOT_DIR"
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: ${{ env.ROOT_DIR }}/app/build/outputs/apk/debug/*.apk