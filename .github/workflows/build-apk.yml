name: Build Android TV APK (FULL FIXED)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # CHECKOUT
      # -------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------------
      # UNZIP PROJECT
      # -------------------------------
      - name: Extract ZIP
        run: |
          mkdir -p project
          unzip -o channelsdebrid-final-merged-github-apk-v52-backend-setup-fresh.zip -d project

      # -------------------------------
      # LOCATE ANDROID PROJECT
      # -------------------------------
      - name: Locate Android root
        run: |
          ROOT_DIR=$(find project -type d -name "android-tv-client" | head -n 1)
          echo "ROOT_DIR=$ROOT_DIR"
          if [ -z "$ROOT_DIR" ]; then
            echo "❌ android-tv-client not found"
            exit 1
          fi
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV

      # -------------------------------
      # JAVA
      # -------------------------------
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # -------------------------------
      # ANDROID SDK
      # -------------------------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK 35
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # -------------------------------
      # FORCE GRADLE SETTINGS
      # -------------------------------
      - name: Rewrite settings.gradle
        run: |
          cat > "$ROOT_DIR/settings.gradle" <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "ChannelsDebridTV"
          include ':app'
          EOF

      # -------------------------------
      # FORCE ROOT BUILD FILE
      # -------------------------------
      - name: Rewrite root build.gradle
        run: |
          cat > "$ROOT_DIR/build.gradle" <<'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath "com.android.tools.build:gradle:8.6.1"
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24"
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      # -------------------------------
      # FORCE APP MODULE
      # -------------------------------
      - name: Ensure app module
        run: |
          mkdir -p "$ROOT_DIR/app/src/main/java/com/channelsdebrid/tv"
          mkdir -p "$ROOT_DIR/app/src/main/res/layout"

      # -------------------------------
      # FORCE APP BUILD FILE
      # -------------------------------
      - name: Rewrite app build.gradle
        run: |
          cat > "$ROOT_DIR/app/build.gradle" <<'EOF'
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'

          android {
              namespace "com.channelsdebrid.tv"
              compileSdk 35

              defaultConfig {
                  applicationId "com.channelsdebrid.tv"
                  minSdk 26
                  targetSdk 35
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
                  debug {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              buildFeatures {
                  viewBinding true
              }
          }

          dependencies {
              implementation "androidx.core:core-ktx:1.13.1"
              implementation "androidx.appcompat:appcompat:1.7.0"
              implementation "androidx.leanback:leanback:1.2.0"
              implementation "androidx.media3:media3-exoplayer:1.4.1"
              implementation "androidx.media3:media3-ui:1.4.1"
          }
          EOF

      # -------------------------------
      # GRADLE PROPERTIES
      # -------------------------------
      - name: Write gradle.properties
        run: |
          cat > "$ROOT_DIR/gradle.properties" <<'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m
          EOF

      # -------------------------------
      # INSTALL GRADLE
      # -------------------------------
      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      # -------------------------------
      # SETUP WRAPPER
      # -------------------------------
      - name: Setup Gradle wrapper
        run: |
          cd "$ROOT_DIR"
          gradle wrapper --gradle-version 8.10.2
          chmod +x ./gradlew

      # -------------------------------
      # DEBUG STRUCTURE
      # -------------------------------
      - name: Show project structure
        run: |
          ls -R "$ROOT_DIR"

      # -------------------------------
      # BUILD APK (FORCED MODULE)
      # -------------------------------
      - name: Build APK
        run: |
          cd "$ROOT_DIR"
          ./gradlew :app:assembleDebug --stacktrace --info

      # -------------------------------
      # FIND APK (STRICT)
      # -------------------------------
      - name: Locate APK
        run: |
          APK_PATH=$(find "$ROOT_DIR" -type f -path "*/build/outputs/apk/debug/*.apk" | head -n 1)

          if [ -z "$APK_PATH" ]; then
            echo "❌ APK NOT FOUND"
            find "$ROOT_DIR"
            exit 1
          fi

          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      # -------------------------------
      # COPY APK
      # -------------------------------
      - name: Copy APK
        run: |
          cp "$APK_PATH" app-debug.apk
          ls -lh app-debug.apk

      # -------------------------------
      # UPLOAD APK
      # -------------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: channelsdebrid-tv-apk
          path: app-debug.apk