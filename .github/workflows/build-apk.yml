name: Build Android TV APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir -p project
          unzip channelsdebrid-final-merged-github-apk-v52-backend-setup-fresh.zip -d project

      - name: Locate Android project
        run: |
          ROOT_DIR=$(find project -type d -name "android-tv-client" | head -n 1)
          echo "ROOT_DIR=$ROOT_DIR"
          test -n "$ROOT_DIR"
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Build APK
        run: |
          cd "$ROOT_DIR"

          if [ ! -f "./gradlew" ]; then
            echo "Gradle wrapper missing — generating..."
            gradle wrapper --gradle-version 8.7
          fi

          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Collect APK
        run: |
          echo "Searching for APK..."
          find "$ROOT_DIR" -type f -name "*.apk"

          APK_PATH=$(find "$ROOT_DIR" -type f -name "*.apk" | head -n 1)

          if [ -z "$APK_PATH" ]; then
            echo "❌ APK NOT FOUND"
            exit 1
          fi

          echo "✅ Found APK at: $APK_PATH"

          cp "$APK_PATH" "$GITHUB_WORKSPACE/app-debug.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: channelsdebrid-tv-apk
          path: app-debug.apk
          if-no-files-found: error
          overwrite: true
