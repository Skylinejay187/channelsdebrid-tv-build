name: Build Android TV APK (Native)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ZIP_NAME: channelsdebrid-native-tv.zip

    steps:
      - uses: actions/checkout@v4

      - name: Locate ZIP
        run: |
          if [ -f "$ZIP_NAME" ]; then
            echo "ZIP_PATH=$ZIP_NAME" >> $GITHUB_ENV
          else
            ZIP_PATH=$(find . -name "*.zip" | head -n 1)
            echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_ENV
          fi

      - name: Extract ZIP
        run: |
          rm -rf project
          mkdir project
          unzip -q "$ZIP_PATH" -d project

      - name: Locate Project
        run: |
          ROOT_DIR=$(find project -name settings.gradle -o -name settings.gradle.kts | head -n 1 | xargs dirname)
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Ensure Wrapper
        run: |
          cd "$ROOT_DIR"
          [ -f gradlew ] || gradle wrapper
          chmod +x gradlew

      # ✅ FIX: remove invalid android:selected
      - name: Fix XML
        run: |
          cd "$ROOT_DIR"
          FILE="app/src/main/res/layout/activity_main.xml"
          if [ -f "$FILE" ]; then
            sed -i 's/android:selected="[^"]*"//g' "$FILE"
          fi

      # ✅ SAFE FILE WRITES (NO EOF)
      - name: Write Gradle Files
        run: |
          cd "$ROOT_DIR"

          python3 - <<'PY'
from pathlib import Path

Path("gradle.properties").write_text(
"""org.gradle.jvmargs=-Xmx4g
android.useAndroidX=true
android.enableJetifier=true
""")

Path("build.gradle").write_text(
"""plugins {
    id 'com.android.application' version '8.6.1' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.24' apply false
}
""")
PY

      - name: Build APK
        run: |
          cd "$ROOT_DIR"
          ./gradlew assembleDebug --stacktrace

      - name: Find APK
        run: |
          APK=$(find "$ROOT_DIR" -name "*.apk" | head -n 1)
          cp "$APK" app.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app.apk