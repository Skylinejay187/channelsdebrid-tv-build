name: Build Android TV APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir project
          unzip channelsdebrid-final-merged-github-apk-v52-backend-setup-fresh.zip -d project

      - name: Find android-tv-client
        run: |
          ROOT_DIR=$(find project -type d -name "android-tv-client" | head -n 1)
          echo "ROOT_DIR=$ROOT_DIR"
          test -n "$ROOT_DIR"
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Rewrite AndroidManifest.xml
        run: |
          cat > "$ROOT_DIR/app/src/main/AndroidManifest.xml" <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />

              <application
                  android:allowBackup="true"
                  android:label="ChannelsDebrid TV"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.ChannelsDebridTV">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <activity android:name=".HomeActivity" android:exported="true" android:screenOrientation="landscape" />
                  <activity android:name=".PlayerActivity" android:exported="false" android:screenOrientation="landscape" />
                  <activity android:name=".AppsActivity" android:exported="false" android:screenOrientation="landscape" />
                  <activity android:name=".ServerSetupActivity" android:exported="false" android:screenOrientation="landscape" />
                  <activity android:name=".SettingsActivity" android:exported="false" android:screenOrientation="landscape" />
              </application>
          </manifest>
          EOF

      - name: Rewrite settings.gradle.kts
        run: |
          cat > "$ROOT_DIR/settings.gradle.kts" <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "ChannelsDebridTV"
          include(":app")
          EOF

      - name: Rewrite root build.gradle.kts
        run: |
          cat > "$ROOT_DIR/build.gradle.kts" <<'EOF'
          plugins {
              id("com.android.application") version "8.6.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF

      - name: Rewrite app build.gradle.kts
        run: |
          cat > "$ROOT_DIR/app/build.gradle.kts" <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.channelsdebrid.tv"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.channelsdebrid.tv"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              buildFeatures {
                  viewBinding = true
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.appcompat:appcompat:1.7.0")
              implementation("androidx.activity:activity-ktx:1.9.2")
              implementation("androidx.leanback:leanback:1.2.0")
              implementation("androidx.webkit:webkit:1.11.0")
              implementation("androidx.media3:media3-exoplayer:1.4.1")
              implementation("androidx.media3:media3-ui:1.4.1")
              implementation("androidx.media3:media3-common:1.4.1")
          }
          EOF

      - name: Write gradle.properties
        run: |
          cat > "$ROOT_DIR/gradle.properties" <<'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          kotlin.code.style=official
          EOF

      - name: Rewrite activity_server_setup.xml
        run: |
          mkdir -p "$ROOT_DIR/app/src/main/res/layout"
          cat > "$ROOT_DIR/app/src/main/res/layout/activity_server_setup.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#05070C">

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:padding="32dp">

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Connect to your ChannelsDebrid backend"
                      android:textColor="#FFFFFF"
                      android:textSize="28sp"
                      android:textStyle="bold" />

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="10dp"
                      android:text="Enter your backend URL or auto-detect it on your local network."
                      android:textColor="#C6D8FF"
                      android:textSize="16sp" />

                  <EditText
                      android:id="@+id/backendUrlInput"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="20dp"
                      android:background="#141923"
                      android:hint="http://192.168.1.50:8418/app"
                      android:padding="16dp"
                      android:textColor="#FFFFFF"
                      android:textColorHint="#88A0CC" />

                  <LinearLayout
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="18dp"
                      android:orientation="horizontal">

                      <Button
                          android:id="@+id/testServerBtn"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="Test" />

                      <Button
                          android:id="@+id/autoDetectBtn"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:layout_marginStart="12dp"
                          android:text="Auto Detect" />

                      <Button
                          android:id="@+id/saveServerBtn"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:layout_marginStart="12dp"
                          android:text="Save &amp; Open" />
                  </LinearLayout>

                  <TextView
                      android:id="@+id/serverStatus"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="18dp"
                      android:text="No server selected yet."
                      android:textColor="#AFC7FF"
                      android:textSize="14sp" />
              </LinearLayout>
          </ScrollView>
          EOF

      - name: Rewrite AppsActivity.kt
        run: |
          cat > "$ROOT_DIR/app/src/main/java/com/channelsdebrid/tv/AppsActivity.kt" <<'EOF'
          package com.channelsdebrid.tv

          import android.content.Intent
          import android.content.pm.PackageManager
          import android.graphics.Color
          import android.graphics.drawable.ColorDrawable
          import android.graphics.drawable.Drawable
          import android.os.Bundle
          import android.util.TypedValue
          import android.view.Gravity
          import android.view.View
          import android.view.ViewGroup
          import android.widget.AbsListView
          import android.widget.BaseAdapter
          import android.widget.GridView
          import android.widget.ImageView
          import android.widget.LinearLayout
          import android.widget.TextView
          import androidx.appcompat.app.AppCompatActivity

          class AppsActivity : AppCompatActivity() {
              data class AppEntry(
                  val label: String,
                  val packageName: String,
                  val activityName: String,
                  val icon: Drawable?
              )

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)

                  val pm = packageManager
                  val intent = Intent(Intent.ACTION_MAIN, null).apply {
                      addCategory(Intent.CATEGORY_LEANBACK_LAUNCHER)
                  }

                  val apps = pm.queryIntentActivities(intent, PackageManager.MATCH_ALL)
                      .map {
                          AppEntry(
                              label = it.loadLabel(pm).toString(),
                              packageName = it.activityInfo.packageName,
                              activityName = it.activityInfo.name,
                              icon = it.loadIcon(pm)
                          )
                      }
                      .sortedBy { it.label.lowercase() }

                  val grid = GridView(this).apply {
                      numColumns = 4
                      horizontalSpacing = dp(18)
                      verticalSpacing = dp(18)
                      stretchMode = GridView.STRETCH_COLUMN_WIDTH
                      clipToPadding = false
                      setPadding(dp(28), dp(28), dp(28), dp(28))
                      setBackgroundColor(Color.parseColor("#05070C"))
                      selector = ColorDrawable(Color.TRANSPARENT)
                      adapter = AppsAdapter(apps)
                      isFocusable = true
                      isFocusableInTouchMode = true
                  }

                  grid.setOnItemClickListener { _, _, position, _ ->
                      val app = apps[position]
                      val launch = Intent(Intent.ACTION_MAIN).apply {
                          addCategory(Intent.CATEGORY_LEANBACK_LAUNCHER)
                          setClassName(app.packageName, app.activityName)
                          addFlags(Intent.FLAG_ACTIVITY_NEW_TASK)
                      }
                      startActivity(launch)
                  }

                  setContentView(grid)
              }

              private fun dp(value: Int): Int =
                  TypedValue.applyDimension(
                      TypedValue.COMPLEX_UNIT_DIP,
                      value.toFloat(),
                      resources.displayMetrics
                  ).toInt()

              inner class AppsAdapter(private val items: List<AppEntry>) : BaseAdapter() {
                  override fun getCount(): Int = items.size
                  override fun getItem(position: Int): Any = items[position]
                  override fun getItemId(position: Int): Long = position.toLong()

                  override fun getView(position: Int, convertView: View?, parent: ViewGroup?): View {
                      val context = this@AppsActivity
                      val entry = items[position]

                      val root = if (convertView == null) {
                          LinearLayout(context).apply {
                              orientation = LinearLayout.VERTICAL
                              gravity = Gravity.CENTER_HORIZONTAL
                              setPadding(dp(14), dp(14), dp(14), dp(14))
                              setBackgroundColor(Color.parseColor("#141923"))
                              layoutParams = AbsListView.LayoutParams(
                                  ViewGroup.LayoutParams.MATCH_PARENT,
                                  dp(210)
                              )
                              isFocusable = true
                              isClickable = true
                          }
                      } else {
                          convertView as LinearLayout
                      }

                      root.removeAllViews()

                      val icon = ImageView(context).apply {
                          layoutParams = LinearLayout.LayoutParams(dp(84), dp(84))
                          setImageDrawable(entry.icon)
                      }

                      val label = TextView(context).apply {
                          text = entry.label
                          setTextColor(Color.WHITE)
                          setTextSize(TypedValue.COMPLEX_UNIT_SP, 15f)
                          gravity = Gravity.CENTER
                          maxLines = 2
                          setPadding(0, dp(12), 0, 0)
                      }

                      root.addView(icon)
                      root.addView(label)

                      root.setOnFocusChangeListener { v, hasFocus ->
                          v.scaleX = if (hasFocus) 1.06f else 1.0f
                          v.scaleY = if (hasFocus) 1.06f else 1.0f
                          v.alpha = if (hasFocus) 1.0f else 0.96f
                      }

                      return root
                  }
              }
          }
          EOF

      - name: Rewrite PlayerActivity.kt
        run: |
          cat > "$ROOT_DIR/app/src/main/java/com/channelsdebrid/tv/PlayerActivity.kt" <<'EOF'
          package com.channelsdebrid.tv

          import android.net.Uri
          import android.os.Bundle
          import android.view.KeyEvent
          import android.view.View
          import android.widget.TextView
          import androidx.appcompat.app.AppCompatActivity
          import androidx.media3.common.C
          import androidx.media3.common.MediaItem
          import androidx.media3.common.PlaybackException
          import androidx.media3.common.Player
          import androidx.media3.common.TrackGroup
          import androidx.media3.exoplayer.ExoPlayer
          import androidx.media3.ui.PlayerView

          class PlayerActivity : AppCompatActivity() {

              private var player: ExoPlayer? = null
              private lateinit var playerView: PlayerView
              private lateinit var titleText: TextView
              private lateinit var metaText: TextView
              private lateinit var controlsHint: TextView
              private lateinit var trackHint: TextView

              private var resumeMs: Long = 0L
              private var hintVisible = true

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_player)

                  playerView = findViewById(R.id.playerView)
                  titleText = findViewById(R.id.titleText)
                  metaText = findViewById(R.id.metaText)
                  controlsHint = findViewById(R.id.controlsHint)
                  trackHint = findViewById(R.id.trackHint)

                  val title = intent.getStringExtra(EXTRA_TITLE) ?: "Native Player"
                  val url = intent.getStringExtra(EXTRA_URL) ?: ""
                  val subtitle = intent.getStringExtra(EXTRA_META) ?: "Media3 / ExoPlayer playback"
                  resumeMs = intent.getLongExtra(EXTRA_RESUME_MS, 0L)

                  titleText.text = title
                  metaText.text = subtitle
                  controlsHint.text = "DPAD center: play/pause • Left/Right: seek 10s • Up/Down: show controls"
                  trackHint.text = "Audio/Subtitles scaffold"

                  if (url.isNotBlank()) {
                      initializePlayer(url, title)
                  } else {
                      metaText.text = "No playback URL supplied. Launch PlayerActivity with EXTRA_URL."
                  }
              }

              private fun initializePlayer(url: String, title: String) {
                  val exoPlayer = ExoPlayer.Builder(this).build()
                  player = exoPlayer
                  playerView.player = exoPlayer

                  val mediaItem = MediaItem.Builder()
                      .setUri(Uri.parse(url))
                      .setMediaId(title)
                      .build()

                  exoPlayer.addListener(object : Player.Listener {
                      override fun onPlaybackStateChanged(playbackState: Int) {
                          metaText.text = when (playbackState) {
                              Player.STATE_BUFFERING -> "Buffering…"
                              Player.STATE_READY -> if (resumeMs > 0L) {
                                  "Playing in native Media3 player • resumed"
                              } else {
                                  "Playing in native Media3 player"
                              }
                              Player.STATE_ENDED -> "Playback ended"
                              else -> metaText.text
                          }
                      }

                      override fun onPlayerError(error: PlaybackException) {
                          metaText.text = "Playback error: ${error.errorCodeName}"
                      }

                      override fun onTracksChanged(tracks: Player.Tracks) {
                          var hasText = false
                          var hasAudio = false

                          for (group in tracks.groups) {
                              if (group.type == C.TRACK_TYPE_TEXT && group.isSupported) {
                                  hasText = true
                              }
                              if (group.type == C.TRACK_TYPE_AUDIO && group.isSupported) {
                                  hasAudio = true
                              }
                          }

                          trackHint.text = buildString {
                              append("Audio: ")
                              append(if (hasAudio) "available" else "none")
                              append(" • Subtitles: ")
                              append(if (hasText) "available" else "none")
                          }
                      }
                  })

    
