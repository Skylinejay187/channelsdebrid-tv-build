name: Build Android TV APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find ZIP
        run: |
          ZIP_PATH=$(find . -name "*.zip" | head -n 1)
          echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_ENV
          echo "Using ZIP: $ZIP_PATH"

      - name: Extract ZIP
        run: |
          rm -rf project
          mkdir project
          unzip -q "$ZIP_PATH" -d project

      - name: Find Android Project
        run: |
          ROOT_DIR=$(find project -name "settings.gradle*" | head -n 1 | xargs dirname)
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV
          echo "Project: $ROOT_DIR"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      # 🔥 CLEAN EVERYTHING THAT BREAKS BUILDS
      - name: Clean Gradle configs
        run: |
          cd "$ROOT_DIR"
          rm -f settings.gradle.kts
          rm -f build.gradle.kts
          rm -f app/build.gradle.kts

      # 🔥 REWRITE SAFE CONFIG
      - name: Write working config
        run: |
          cd "$ROOT_DIR"

          cat > settings.gradle <<EOF
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.name = "ChannelsDebridTV"
include ':app'
EOF

          cat > build.gradle <<EOF
plugins {
    id 'com.android.application' version '8.6.1' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.24' apply false
}
EOF

          cat > gradle.properties <<EOF
org.gradle.jvmargs=-Xmx4g
android.useAndroidX=true
android.enableJetifier=true
EOF

      - name: Ensure wrapper
        run: |
          cd "$ROOT_DIR"
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Build APK
        run: |
          cd "$ROOT_DIR"
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: ${{ env.ROOT_DIR }}/app/build/outputs/apk/debug/*.apk