      - name: Patch web UI fullscreen and remove side detail card
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT_DIR"

          python3 - <<'PY'
from pathlib import Path

targets = []
for ext in ("*.html", "*.htm", "*.css", "*.js"):
    targets.extend(Path(".").rglob(ext))

css_patch = """
html, body, #app, .app, .shell, .page, main {
  width: 100vw !important;
  height: 100vh !important;
  max-width: 100vw !important;
  max-height: 100vh !important;
  margin: 0 !important;
  padding: 0 !important;
  overflow: hidden !important;
}

.selected-title-panel,
.selectedTitlePanel,
.detail-panel,
.details-panel,
.focus-details,
.focus-detail-panel,
.side-details,
.right-details,
.overlay-card,
.floating-details,
.browse-details,
[data-selected-panel],
[data-role="selected-panel"] {
  display: none !important;
  visibility: hidden !important;
  opacity: 0 !important;
  pointer-events: none !important;
}
"""

js_patch = """
document.addEventListener('DOMContentLoaded', function () {
  var selectors = [
    '.selected-title-panel',
    '.selectedTitlePanel',
    '.detail-panel',
    '.details-panel',
    '.focus-details',
    '.focus-detail-panel',
    '.side-details',
    '.right-details',
    '.overlay-card',
    '.floating-details',
    '.browse-details',
    '[data-selected-panel]',
    '[data-role="selected-panel"]'
  ];

  selectors.forEach(function (sel) {
    document.querySelectorAll(sel).forEach(function (el) {
      el.style.display = 'none';
      el.style.visibility = 'hidden';
      el.style.opacity = '0';
      el.style.pointerEvents = 'none';
    });
  });

  document.documentElement.style.width = '100vw';
  document.documentElement.style.height = '100vh';
  document.body.style.width = '100vw';
  document.body.style.height = '100vh';
  document.body.style.margin = '0';
  document.body.style.padding = '0';
  document.body.style.overflow = 'hidden';
});
"""

count = 0

for path in targets:
    try:
        text = path.read_text(encoding="utf-8", errors="ignore")
    except Exception:
        continue

    original = text
    low = text.lower()

    if "selected title" in low:
        text = text.replace("Selected Title", "")
    if "Browse details here." in text:
        text = text.replace("Browse details here.", "")
    if "Browse details here" in text:
        text = text.replace("Browse details here", "")

    if path.suffix in (".html", ".htm"):
        if css_patch not in text:
            if "</head>" in text:
                text = text.replace("</head>", "<style>\n" + css_patch + "\n</style>\n</head>", 1)
            else:
                text = "<style>\n" + css_patch + "\n</style>\n" + text

        if js_patch not in text:
            if "</body>" in text:
                text = text.replace("</body>", "<script>\n" + js_patch + "\n</script>\n</body>", 1)
            else:
                text += "\n<script>\n" + js_patch + "\n</script>\n"

    elif path.suffix == ".css":
        if css_patch not in text:
            text += "\n" + css_patch + "\n"

    elif path.suffix == ".js":
        if js_patch not in text:
            text += "\n" + js_patch + "\n"

    if text != original:
        path.write_text(text, encoding="utf-8")
        print("Patched:", path)
        count += 1

print("Patched files:", count)
PY

