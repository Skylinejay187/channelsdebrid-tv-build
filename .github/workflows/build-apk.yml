name: Build Android TV APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir project
          unzip channelsdebrid-final-merged-github-apk-v52-backend-setup-fresh.zip -d project

      - name: Find android-tv-client
        run: |
          ROOT_DIR=$(find project -type d -name "android-tv-client" | head -n 1)
          echo "ROOT_DIR=$ROOT_DIR"
          if [ -z "$ROOT_DIR" ]; then
            echo "android-tv-client not found"
            exit 1
          fi
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      # ✅ FIXED MANIFEST (CRASH FIX)
      - name: Rewrite AndroidManifest.xml
        run: |
          cat > "$ROOT_DIR/app/src/main/AndroidManifest.xml" <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.channelsdebrid.tv">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />

              <application
                  android:allowBackup="true"
                  android:label="ChannelsDebrid TV"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.ChannelsDebridTV">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <activity android:name=".HomeActivity" android:exported="true"/>
                  <activity android:name=".PlayerActivity"/>
                  <activity android:name=".AppsActivity"/>
                  <activity android:name=".ServerSetupActivity"/>
                  <activity android:name=".SettingsActivity"/>

              </application>
          </manifest>
          EOF

      # ✅ GRADLE FIXES
      - name: Rewrite settings.gradle.kts
        run: |
          cat > "$ROOT_DIR/settings.gradle.kts" <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "ChannelsDebridTV"
          include(":app")
          EOF

      - name: Rewrite root build.gradle.kts
        run: |
          cat > "$ROOT_DIR/build.gradle.kts" <<'EOF'
          plugins {
              id("com.android.application") version "8.6.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF

      - name: Rewrite app build.gradle.kts
        run: |
          cat > "$ROOT_DIR/app/build.gradle.kts" <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.channelsdebrid.tv"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.channelsdebrid.tv"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.appcompat:appcompat:1.7.0")
              implementation("androidx.activity:activity-ktx:1.9.2")
              implementation("androidx.leanback:leanback:1.2.0")
              implementation("androidx.webkit:webkit:1.11.0")
              implementation("androidx.media3:media3-exoplayer:1.4.1")
              implementation("androidx.media3:media3-ui:1.4.1")
          }
          EOF

      - name: Write gradle.properties
        run: |
          cat > "$ROOT_DIR/gradle.properties" <<'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m
          EOF

      # ✅ FIX BAD XML
      - name: Fix XML
        run: |
          sed -i 's/& /&amp; /g' "$ROOT_DIR/app/src/main/res/layout/"*.xml || true

      # ❌ REMOVE BAD SUDO STEP (THIS BROKE YOUR LAST BUILD)
      # (intentionally removed)

      # ✅ GRADLE WRAPPER SETUP
      - name: Setup Gradle Wrapper
        run: |
          cd "$ROOT_DIR"
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x gradlew

      # ✅ BUILD APK
      - name: Build APK
        run: |
          cd "$ROOT_DIR"
          ./gradlew assembleDebug --stacktrace

      # 🔥 BULLETPROOF APK DETECTION
      - name: Locate APK
        run: |
          echo "Searching for APK..."
          find . -name "*.apk"

      - name: Copy APK to root
        run: |
          APK_PATH=$(find . -name "*.apk" | head -n 1)
          echo "Found APK at: $APK_PATH"
          cp "$APK_PATH" app-debug.apk

      # ✅ GUARANTEED ARTIFACT
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: channelsdebrid-tv-apk
          path: app-debug.apk
