name: Build Android TV APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir -p project
          unzip channelsdebrid-final-merged-github-apk-v52-backend-setup-fresh.zip -d project

      - name: Find Android project
        run: |
          ROOT_DIR=$(find project -type d -name "android-tv-client" | head -n 1)
          echo "ROOT_DIR=$ROOT_DIR"
          test -n "$ROOT_DIR"
          echo "ROOT_DIR=$ROOT_DIR" >> "$GITHUB_ENV"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd "$ROOT_DIR"
          chmod +x gradlew || true
          ./gradlew assembleDebug --stacktrace

      - name: Collect APK
        run: |
          APK=$(find "$ROOT_DIR" -type f -name "*.apk" | head -n 1)
          echo "APK FOUND: $APK"
          test -n "$APK"
          cp "$APK" "$GITHUB_WORKSPACE/channelsdebrid-tv-debug.apk"
          ls -lah "$GITHUB_WORKSPACE/channelsdebrid-tv-debug.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: channelsdebrid-tv-apk
          path: ${{ github.workspace }}/channelsdebrid-tv-debug.apk
          if-no-files-found: error
          overwrite: true
          retention-days: 7
