          cat > "$APPS_KT" <<'EOF'
package com.channelsdebrid.tv

import android.content.Intent
import android.content.pm.PackageManager
import android.graphics.Color
import android.graphics.drawable.ColorDrawable
import android.graphics.drawable.Drawable
import android.os.Bundle
import android.util.TypedValue
import android.view.Gravity
import android.view.View
import android.view.ViewGroup
import android.widget.AbsListView
import android.widget.BaseAdapter
import android.widget.GridView
import android.widget.ImageView
import android.widget.LinearLayout
import android.widget.TextView
import androidx.appcompat.app.AppCompatActivity

class AppsActivity : AppCompatActivity() {

    data class AppEntry(
        val label: String,
        val packageName: String,
        val activityName: String,
        val icon: Drawable?
    )

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)

        val pm = packageManager
        val intent = Intent(Intent.ACTION_MAIN, null).apply {
            addCategory(Intent.CATEGORY_LEANBACK_LAUNCHER)
        }

        val apps = pm.queryIntentActivities(intent, PackageManager.MATCH_ALL)
            .map {
                AppEntry(
                    label = it.loadLabel(pm).toString(),
                    packageName = it.activityInfo.packageName,
                    activityName = it.activityInfo.name,
                    icon = it.loadIcon(pm)
                )
            }
            .sortedBy { it.label.lowercase() }

        val grid = GridView(this).apply {
            numColumns = 4
            horizontalSpacing = dp(18)
            verticalSpacing = dp(18)
            stretchMode = GridView.STRETCH_COLUMN_WIDTH
            clipToPadding = false
            setPadding(dp(28), dp(28), dp(28), dp(28))
            setBackgroundColor(Color.parseColor("#05070C"))
            selector = ColorDrawable(Color.TRANSPARENT)
            adapter = AppsAdapter(apps)
            isFocusable = true
            isFocusableInTouchMode = true
        }

        grid.setOnItemClickListener { _, _, position, _ ->
            val app = apps[position]
            val launch = Intent(Intent.ACTION_MAIN).apply {
                addCategory(Intent.CATEGORY_LEANBACK_LAUNCHER)
                setClassName(app.packageName, app.activityName)
                addFlags(Intent.FLAG_ACTIVITY_NEW_TASK)
            }
            startActivity(launch)
        }

        setContentView(grid)
    }

    private fun dp(value: Int): Int {
        return TypedValue.applyDimension(
            TypedValue.COMPLEX_UNIT_DIP,
            value.toFloat(),
            resources.displayMetrics
        ).toInt()
    }

    inner class AppsAdapter(private val items: List<AppEntry>) : BaseAdapter() {
        override fun getCount(): Int = items.size
        override fun getItem(position: Int): Any = items[position]
        override fun getItemId(position: Int): Long = position.toLong()

        override fun getView(position: Int, convertView: View?, parent: ViewGroup?): View {
            val context = this@AppsActivity
            val entry = items[position]

            val root = if (convertView == null) {
                LinearLayout(context).apply {
                    orientation = LinearLayout.VERTICAL
                    gravity = Gravity.CENTER_HORIZONTAL
                    setPadding(dp(14), dp(14), dp(14), dp(14))
                    setBackgroundColor(Color.parseColor("#141923"))
                    layoutParams = AbsListView.LayoutParams(
                        ViewGroup.LayoutParams.MATCH_PARENT,
                        dp(210)
                    )
                    isFocusable = true
                    isClickable = true
                }
            } else {
                convertView as LinearLayout
            }

            root.removeAllViews()

            val iconView = ImageView(context).apply {
                layoutParams = LinearLayout.LayoutParams(dp(84), dp(84))
                setImageDrawable(entry.icon)
            }

            val labelView = TextView(context).apply {
                text = entry.label
                setTextColor(Color.WHITE)
                setTextSize(TypedValue.COMPLEX_UNIT_SP, 15f)
                gravity = Gravity.CENTER
                maxLines = 2
                setPadding(0, dp(12), 0, 0)
            }

            root.addView(iconView)
            root.addView(labelView)

            root.setOnFocusChangeListener { view, hasFocus ->
                view.scaleX = if (hasFocus) 1.06f else 1.0f
                view.scaleY = if (hasFocus) 1.06f else 1.0f
                view.alpha = if (hasFocus) 1.0f else 0.96f
            }

            return root
        }
    }
}
EOF

      - name: Rewrite PlayerActivity.kt
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT_DIR"

          PLAYER_KT="app/src/main/java/com/channelsdebrid/tv/PlayerActivity.kt"
          if [ ! -f "$PLAYER_KT" ]; then
            echo "PlayerActivity.kt not found, skipping."
            exit 0
          fi

          cat > "$PLAYER_KT" <<'EOF'
package com.channelsdebrid.tv

import android.net.Uri
import android.os.Bundle
import android.view.KeyEvent
import android.view.View
import android.widget.TextView
import androidx.appcompat.app.AppCompatActivity
import androidx.media3.common.C
import androidx.media3.common.MediaItem
import androidx.media3.common.PlaybackException
import androidx.media3.common.Player
import androidx.media3.common.Tracks
import androidx.media3.exoplayer.ExoPlayer
import androidx.media3.ui.PlayerView

class PlayerActivity : AppCompatActivity() {

    private var player: ExoPlayer? = null
    private lateinit var playerView: PlayerView
    private lateinit var titleText: TextView
    private lateinit var metaText: TextView
    private lateinit var controlsHint: TextView
    private lateinit var trackHint: TextView

    private var resumeMs: Long = 0L
    private var hintVisible = true

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        setContentView(R.layout.activity_player)

        playerView = findViewById(R.id.playerView)
        titleText = findViewById(R.id.titleText)
        metaText = findViewById(R.id.metaText)
        controlsHint = findViewById(R.id.controlsHint)
        trackHint = findViewById(R.id.trackHint)

        val title = intent.getStringExtra(EXTRA_TITLE) ?: "Native Player"
        val url = intent.getStringExtra(EXTRA_URL) ?: ""
        val subtitle = intent.getStringExtra(EXTRA_META) ?: "Media3 / ExoPlayer playback"
        resumeMs = intent.getLongExtra(EXTRA_RESUME_MS, 0L)

        titleText.text = title
        metaText.text = subtitle
        controlsHint.text = "DPAD center: play/pause • Left/Right: seek 10s • Up/Down: show controls"
        trackHint.text = "Subtitles/audio selection scaffold ready for next pass"

        if (url.isNotBlank()) {
            initializePlayer(url, title)
        } else {
            metaText.text = "No playback URL supplied. Launch PlayerActivity with EXTRA_URL."
        }
    }

    private fun initializePlayer(url: String, title: String) {
        val exoPlayer = ExoPlayer.Builder(this).build()
        player = exoPlayer
        playerView.player = exoPlayer

        val mediaItem = MediaItem.Builder()
            .setUri(Uri.parse(url))
            .setMediaId(title)
            .build()

        exoPlayer.addListener(object : Player.Listener {
            override fun onPlaybackStateChanged(playbackState: Int) {
                metaText.text = when (playbackState) {
                    Player.STATE_BUFFERING -> "Buffering…"
                    Player.STATE_READY ->
                        if (resumeMs > 0L) "Playing in native Media3 player • resumed"
                        else "Playing in native Media3 player"
                    Player.STATE_ENDED -> "Playback ended"
                    else -> metaText.text
                }
            }

            override fun onPlayerError(error: PlaybackException) {
                metaText.text = "Playback error: ${error.errorCodeName}"
            }

            override fun onTracksChanged(tracks: Tracks) {
                val hasText = tracks.groups.any { it.type == C.TRACK_TYPE_TEXT }
                val hasAudio = tracks.groups.any { it.type == C.TRACK_TYPE_AUDIO }

                trackHint.text = buildString {
                    append("Audio: ")
                    append(if (hasAudio) "available" else "none")
                    append(" • Subtitles: ")
                    append(if (hasText) "available" else "none")
                }
            }
        })

        exoPlayer.setMediaItem(mediaItem)
        exoPlayer.prepare()
        if (resumeMs > 0L) exoPlayer.seekTo(resumeMs)
        exoPlayer.playWhenReady = true
    }

    private fun toggleOverlay(forceShow: Boolean? = null) {
        hintVisible = forceShow ?: !hintVisible
        val visibility = if (hintVisible) View.VISIBLE else View.GONE
        (titleText.parent as? View)?.visibility = visibility
    }

    override fun onKeyDown(keyCode: Int, event: KeyEvent?): Boolean {
        val activePlayer = player ?: return super.onKeyDown(keyCode, event)

        when (keyCode) {
            KeyEvent.KEYCODE_DPAD_CENTER,
            KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE -> {
                if (activePlayer.isPlaying) activePlayer.pause() else activePlayer.play()
                return true
            }

            KeyEvent.KEYCODE_DPAD_LEFT -> {
                activePlayer.seekTo((activePlayer.currentPosition - 10_000).coerceAtLeast(0))
                return true
            }

            KeyEvent.KEYCODE_DPAD_RIGHT -> {
                activePlayer.seekTo(activePlayer.currentPosition + 10_000)
                return true
            }

            KeyEvent.KEYCODE_DPAD_UP,
            KeyEvent.KEYCODE_DPAD_DOWN -> {
                toggleOverlay()
                return true
            }
        }

        return super.onKeyDown(keyCode, event)
    }

    override fun onStart() {
        super.onStart()
        player?.playWhenReady = true
    }

    override fun onStop() {
        player?.playWhenReady = false
        super.onStop()
    }

    override fun onDestroy() {
        playerView.player = null
        player?.release()
        player = null
        super.onDestroy()
    }

    companion object {
        const val EXTRA_URL = "extra_url"
        const val EXTRA_TITLE = "extra_title"
        const val EXTRA_META = "extra_meta"
        const val EXTRA_RESUME_MS = "extra_resume_ms"
    }
}
EOF

      - name: Ensure Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT_DIR"
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT_DIR"
          ./gradlew :app:assembleDebug --stacktrace --info

      - name: Copy APK to artifact name
        shell: bash
        run: |
          set -euo pipefail
          APK_PATH="$(find "$ROOT_DIR/app/build/outputs/apk" -type f -name '*.apk' | head -n 1 || true)"

          if [ -z "${APK_PATH:-}" ] || [ ! -f "$APK_PATH" ]; then
            echo "APK not found."
            find "$ROOT_DIR/app/build" -maxdepth 6 -type f | sed -n '1,200p' || true
            exit 1
          fi

          echo "Found APK: $APK_PATH"
          cp "$APK_PATH" "$GITHUB_WORKSPACE/channelsdebrid-tv-debug.apk"
          ls -lh "$GITHUB_WORKSPACE/channelsdebrid-tv-debug.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: channelsdebrid-tv-debug-apk
          path: ${{ github.workspace }}/channelsdebrid-tv-debug.apk
          if-no-files-found: error
          overwrite: true
          retention-days: 7
