name: Build Android TV APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show repo files
        run: |
          echo "=== ROOT FILES ==="
          ls -la

      - name: Unzip source package
        run: |
          mkdir project
          unzip channelsdebrid-final-merged-github-apk-v52-backend-setup-fresh.zip -d project

          echo "=== FULL TREE ==="
          find project -type d | sort

      # 🔥 HARD DETECT + VERIFY
      - name: Detect Android project root
        run: |
          ROOT_DIR=$(find project -type d -name "android-tv-client" | head -n 1)

          echo "FOUND ROOT_DIR=$ROOT_DIR"

          if [ -z "$ROOT_DIR" ]; then
            echo "❌ ERROR: android-tv-client not found"
            exit 1
          fi

          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV

      # ✅ FIXED JAVA
      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 🔥 FORCE BUILD VISIBILITY
      - name: Build APK
        run: |
          echo "USING ROOT_DIR=$ROOT_DIR"
          cd "$ROOT_DIR" || exit 1

          echo "=== INSIDE ROOT ==="
          ls -la

          chmod +x ./gradlew || true

          echo "=== RUNNING BUILD ==="
          ./gradlew assembleDebug --stacktrace

      # 🔍 DEBUG OUTPUT
      - name: Show build outputs
        if: always()
        run: |
          echo "=== APK SEARCH ==="
          find project -type f -name "*.apk" | sort || true

      # ✅ SIMPLE UPLOAD (NO ENV ISSUES)
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: channelsdebrid-tv-debug-apk
          path: project/**/*.apk
      # ✅ FIX HERE (Java 11 instead of 17)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Prepare Gradle wrapper
        run: |
          cd "$ROOT_DIR"
          if [ ! -f "./gradlew" ]; then
            gradle wrapper
          fi
          chmod +x ./gradlew

      - name: Build APK
        run: |
          cd "$ROOT_DIR"
          ./gradlew assembleDebug

      - name: Show build outputs
        if: always()
        run: |
          echo "=== APK SEARCH ==="
          find project -type f -name "*.apk" | sort || true

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: channelsdebrid-tv-debug-apk
          path: |
            project/**/*.apk
