name: Build Android TV APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir -p project
          unzip channelsdebrid-final-merged-github-apk-v52-backend-setup-fresh.zip -d project

      - name: Find android-tv-client
        run: |
          ROOT_DIR=$(find project -type d -name "android-tv-client" | head -n 1)
          echo "ROOT_DIR=$ROOT_DIR"
          test -n "$ROOT_DIR"
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Rewrite AndroidManifest.xml
        run: |
          cat > "$ROOT_DIR/app/src/main/AndroidManifest.xml" <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />

              <application
                  android:allowBackup="true"
                  android:label="ChannelsDebrid TV"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.ChannelsDebridTV">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <activity android:name=".HomeActivity" android:exported="true" android:screenOrientation="landscape" />
                  <activity android:name=".PlayerActivity" android:exported="false" android:screenOrientation="landscape" />
                  <activity android:name=".AppsActivity" android:exported="false" android:screenOrientation="landscape" />
                  <activity android:name=".ServerSetupActivity" android:exported="false" android:screenOrientation="landscape" />
                  <activity android:name=".SettingsActivity" android:exported="false" android:screenOrientation="landscape" />
              </application>
          </manifest>
          EOF

      - name: Rewrite settings.gradle.kts
        run: |
          cat > "$ROOT_DIR/settings.gradle.kts" <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "ChannelsDebridTV"
          include(":app")
          EOF

      - name: Rewrite root build.gradle.kts
        run: |
          cat > "$ROOT_DIR/build.gradle.kts" <<'EOF'
          plugins {
              id("com.android.application") version "8.6.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF

      - name: Rewrite app build.gradle.kts
        run: |
          cat > "$ROOT_DIR/app/build.gradle.kts" <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.channelsdebrid.tv"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.channelsdebrid.tv"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              buildFeatures {
                  viewBinding = true
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.appcompat:appcompat:1.7.0")
              implementation("androidx.activity:activity-ktx:1.9.2")
              implementation("androidx.leanback:leanback:1.2.0")
              implementation("androidx.webkit:webkit:1.11.0")
              implementation("androidx.media3:media3-exoplayer:1.4.1")
              implementation("androidx.media3:media3-ui:1.4.1")
              implementation("androidx.media3:media3-common:1.4.1")
          }
          EOF

      - name: Write gradle.properties
        run: |
          cat > "$ROOT_DIR/gradle.properties" <<'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          kotlin.code.style=official
          EOF

      - name: Rewrite activity_server_setup.xml
        run: |
          mkdir -p "$ROOT_DIR/app/src/main/res/layout"
          cat > "$ROOT_DIR/app/src/main/res/layout/activity_server_setup.xml" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#05070C">

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:padding="32dp">

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="Connect to your ChannelsDebrid backend"
                      android:textColor="#FFFFFF"
                      android:textSize="28sp"
                      android:textStyle="bold" />

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="10dp"
                      android:text="Enter your backend URL or auto-detect it on your local network."
                      android:textColor="#C6D8FF"
                      android:textSize="16sp" />

                  <EditText
                      android:id="@+id/backendUrlInput"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="20dp"
                      android:hint="http://192.168.1.50:8418/app"
                      android:padding="16dp" />

                  <LinearLayout
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="18dp"
                      android:orientation="horizontal">

                      <Button
                          android:id="@+id/testServerBtn"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="Test" />

                      <Button
                          android:id="@+id/autoDetectBtn"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:layout_marginStart="12dp"
                          android:text="Auto Detect" />

                      <Button
                          android:id="@+id/saveServerBtn"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:layout_marginStart="12dp"
                          android:text="Save &amp; Open" />
                  </LinearLayout>

                  <TextView
                      android:id="@+id/serverStatus"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_marginTop="18dp"
                      android:text="No server selected yet." />
              </LinearLayout>
          </ScrollView>
          EOF

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Setup Gradle Wrapper
        run: |
          cd "$ROOT_DIR"
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Build APK
        run: |
          cd "$ROOT_DIR"
          ./gradlew assembleDebug --stacktrace

      - name: Collect APK
        run: |
          APK=$(find "$ROOT_DIR" -type f -name "*.apk" | head -n 1)
          echo "APK=$APK"
          test -n "$APK"
          cp "$APK" "$GITHUB_WORKSPACE/channelsdebrid-tv-debug.apk"
          ls -lh "$GITHUB_WORKSPACE/channelsdebrid-tv-debug.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: channelsdebrid-tv-apk
          path: ${{ github.workspace }}/channelsdebrid-tv-debug.apk
          if-no-files-found: error
