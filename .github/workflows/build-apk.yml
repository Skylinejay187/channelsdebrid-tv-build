name: Build Android TV APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ZIP_NAME: channelsdebrid-final-merged-github-apk-v52-backend-setup-fresh.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate ZIP
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "$ZIP_NAME" ]; then
            ZIP_PATH="$ZIP_NAME"
          else
            ZIP_PATH="$(find . -maxdepth 3 -type f -name '*.zip' | head -n 1 || true)"
          fi

          if [ -z "${ZIP_PATH:-}" ] || [ ! -f "$ZIP_PATH" ]; then
            echo "No ZIP file found in repository."
            ls -la
            exit 1
          fi

          echo "ZIP_PATH=$ZIP_PATH" >> "$GITHUB_ENV"
          echo "Using ZIP: $ZIP_PATH"

      - name: Extract ZIP
        shell: bash
        run: |
          set -euo pipefail
          rm -rf project
          mkdir -p project
          unzip -q "$ZIP_PATH" -d project

      - name: Locate Android project
        shell: bash
        run: |
          set -euo pipefail
          ROOT_DIR="$(find project -type f \( -name 'settings.gradle.kts' -o -name 'settings.gradle' \) | head -n 1 | xargs dirname)"

          if [ -z "${ROOT_DIR:-}" ] || [ ! -d "$ROOT_DIR" ]; then
            echo "Android project directory not found."
            find project -maxdepth 6 | sed -n '1,200p'
            exit 1
          fi

          echo "ROOT_DIR=$ROOT_DIR" >> "$GITHUB_ENV"
          echo "Android project: $ROOT_DIR"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Rewrite settings.gradle
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT_DIR"

          if [ -f "settings.gradle.kts" ]; then
            cat > settings.gradle.kts <<'EOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.name = "ChannelsDebridTV"
include(":app")
EOF
          else
            cat > settings.gradle <<'EOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.name = "ChannelsDebridTV"
include ':app'
EOF
          fi

      - name: Rewrite root build.gradle
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT_DIR"

          if [ -f "build.gradle.kts" ]; then
            cat > build.gradle.kts <<'EOF'
plugins {
    id("com.android.application") version "8.6.1" apply false
    id("org.jetbrains.kotlin.android") version "1.9.24" apply false
}
EOF
          else
