name: Build Android TV APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip source package
        run: |
          mkdir project
          unzip channelsdebrid-final-merged-github-apk-v52-backend-setup-fresh.zip -d project

      - name: Detect Android project root
        run: |
          ROOT_DIR=$(find project -type d -name "android-tv-client" | head -n 1)
          echo "Detected ROOT_DIR=$ROOT_DIR"
          if [ -z "$ROOT_DIR" ]; then
            echo "ERROR: android-tv-client folder not found"
            exit 1
          fi
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV

      # ✅ FIX 1: Add Google repo (fix plugin error)
      - name: Patch settings.gradle.kts
        run: |
          cat > "$ROOT_DIR/settings.gradle.kts" <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "ChannelsDebridTV"
          include(":app")
          EOF

      # ✅ FIX 2: Enable AndroidX
      - name: Patch gradle.properties
        run: |
          cat > "$ROOT_DIR/gradle.properties" <<'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          kotlin.code.style=official
          EOF

      # ✅ FIX 3: Fix XML crash (& symbol)
      - name: Fix XML ampersand crash
        run: |
          sed -i 's/Save & Open/Save \&amp; Open/g' "$ROOT_DIR/app/src/main/res/layout/activity_server_setup.xml" || true

      # ✅ FIX 4: Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ✅ FIX 5: Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ✅ FIX 6: Install Gradle (for wrapper fallback)
      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      # ✅ FIX 7: Ensure gradlew exists
      - name: Create Gradle wrapper if missing
        run: |
          cd "$ROOT_DIR"
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew

      # ✅ FIX 8: Force correct Gradle version
      - name: Force Gradle 8.7
        run: |
          cd "$ROOT_DIR"
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      # ✅ BUILD APK
      - name: Build APK
        run: |
          cd "$ROOT_DIR"
          ./gradlew assembleDebug --stacktrace

      # ✅ DEBUG: show APK
      - name: Show APK files
        if: always()
        run: |
          echo "=== APK FILES ==="
          find project -type f -name "*.apk" | sort || true

      # ✅ UPLOAD APK
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: channelsdebrid-tv-debug-apk
          path: project/**/*.apk
