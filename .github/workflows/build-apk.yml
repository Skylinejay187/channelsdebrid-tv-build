name: Build Debrid Channels Android TV

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.13 and cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: yes | sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Unit tests
        run: gradle --no-daemon testDebugUnitTest

      - name: Lint
        run: gradle --no-daemon lintDebug

      - name: Build debug APK and release bundle
        run: gradle --no-daemon :app:assembleDebug :app:assembleRelease :app:bundleRelease

      - name: Upload APKs and bundle
        uses: actions/upload-artifact@v4
        with:
          name: DebridChannels-AndroidTV-Phase1
          if-no-files-found: error
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
            app/build/reports/lint-results-debug.html
            
