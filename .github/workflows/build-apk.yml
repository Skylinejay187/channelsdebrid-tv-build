name: Build Android TV APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ZIP_NAME: channelsdebrid-native-tv-fixed-v3.zip

    steps:
      - uses: actions/checkout@v4

      - name: Locate ZIP
        run: |
          if [ -f "$ZIP_NAME" ]; then
            echo "ZIP_PATH=$ZIP_NAME" >> $GITHUB_ENV
          else
            ZIP_PATH=$(find . -name "*.zip" | head -n 1)
            echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_ENV
          fi

      - name: Extract ZIP
        run: |
          rm -rf project
          mkdir project
          unzip -q "$ZIP_PATH" -d project

      - name: Locate Android Project
        run: |
          ROOT_DIR=$(find project -name settings.gradle* | head -n 1 | xargs dirname)
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      # 🔥 CRITICAL FIX: REMOVE ALL EXISTING GRADLE FILES
      - name: Clean broken Gradle config
        run: |
          cd "$ROOT_DIR"
          rm -f settings.gradle.kts
          rm -f build.gradle.kts
          rm -f app/build.gradle.kts

      # 🔥 WRITE CORRECT FILES
      - name: Write working Gradle config
        run: |
          cd "$ROOT_DIR"

          python3 - <<'PY'
from pathlib import Path

Path("settings.gradle").write_text("""pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.name = "ChannelsDebridTV"
include ':app'
""")

Path("build.gradle").write_text("""plugins {
    id 'com.android.application' version '8.6.1' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.24' apply false
}
""")

Path("gradle.properties").write_text("""org.gradle.jvmargs=-Xmx4g
android.useAndroidX=true
android.enableJetifier=true
""")

Path("app/build.gradle").write_text("""plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.channelsdebrid.tv'
    compileSdk 35

    defaultConfig {
        applicationId "com.channelsdebrid.tv"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug { minifyEnabled false }
        release { minifyEnabled false }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions { jvmTarget = '17' }

    buildFeatures { viewBinding true }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.activity:activity-ktx:1.9.2'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.leanback:leanback:1.2.0'
}
""")
PY

      - name: Ensure Gradle wrapper
        run: |
          cd "$ROOT_DIR"
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Build APK
        run: |
          cd "$ROOT_DIR"
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: ${{ env.ROOT_DIR }}/app/build/outputs/apk/debug/*.apk