name: Build Android TV APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir project
          unzip channelsdebrid-final-merged-github-apk-v52-backend-setup-fresh.zip -d project

      - name: Find android-tv-client
        run: |
          ROOT_DIR=$(find project -type d -name "android-tv-client" | head -n 1)
          echo "ROOT_DIR=$ROOT_DIR"
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV

      # ✅ Fix repositories
      - name: Fix settings.gradle.kts
        run: |
          cat > "$ROOT_DIR/settings.gradle.kts" <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "ChannelsDebridTV"
          include(":app")
          EOF

      # ✅ Enable AndroidX
      - name: Fix gradle.properties
        run: |
          cat > "$ROOT_DIR/gradle.properties" <<'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m
          EOF

      # ✅ Fix XML crash
      - name: Fix XML ampersand
        run: |
          sed -i 's/Save & Open/Save \&amp; Open/g' "$ROOT_DIR/app/src/main/res/layout/activity_server_setup.xml" || true

      # ✅ Upgrade Android Gradle Plugin
      - name: Upgrade AGP to 8.6.0
        run: |
          sed -i 's/com.android.application.*8.5.2/com.android.application version "8.6.0" apply false/' "$ROOT_DIR/build.gradle.kts" || true

      # ✅ Force compileSdk 35
      - name: Force compileSdk 35
        run: |
          sed -i 's/compileSdk *= *34/compileSdk = 35/g' "$ROOT_DIR/app/build.gradle.kts" || true

      # ✅ Java 17
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ✅ Android SDK
      - uses: android-actions/setup-android@v3

      # ✅ Ensure Gradle wrapper
      - name: Setup Gradle Wrapper
        run: |
          cd "$ROOT_DIR"
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew

      # ✅ Force Gradle 8.7
      - name: Force Gradle 8.7
        run: |
          cd "$ROOT_DIR"
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      # ✅ Build APK
      - name: Build APK
        run: |
          cd "$ROOT_DIR"
          ./gradlew assembleDebug --stacktrace

      # ✅ Show APK
      - name: Find APK
        if: always()
        run: find project -name "*.apk"

      # ✅ Upload APK
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: channelsdebrid-tv-apk
          path: project/**/*.apk
