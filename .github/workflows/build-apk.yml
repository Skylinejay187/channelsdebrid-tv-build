name: Build Android TV APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show repo files
        run: |
          pwd
          ls -la

      - name: Download source zip
        run: |
          curl -L -o app.zip https://github.com/android/architecture-samples/archive/refs/heads/main.zip

      - name: Unzip
        run: |
          mkdir project
          unzip app.zip -d project
          find project -maxdepth 3 -type d | sort

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Build APK
        run: |
          cd project/*/app || true
          gradle assembleDebug || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "**/*.apk"
