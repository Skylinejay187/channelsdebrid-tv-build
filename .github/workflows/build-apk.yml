name: Build Android TV APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ZIP_NAME: channelsdebrid-final-merged-github-apk-v52-backend-setup-fresh.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify ZIP exists
        run: |
          if [ ! -f "$ZIP_NAME" ]; then
            echo "ZIP not found: $ZIP_NAME"
            ls -la
            exit 1
          fi

      - name: Extract ZIP
        run: |
          rm -rf project
          mkdir -p project
          unzip -o "$ZIP_NAME" -d project

      - name: Locate Android project
        run: |
          ROOT_DIR="$(find project -type d -name android-tv-client | head -n 1)"
          if [ -z "$ROOT_DIR" ]; then
            echo "android-tv-client not found"
            find project -maxdepth 6 -type d | sort
            exit 1
          fi
          echo "ROOT_DIR=$ROOT_DIR" >> "$GITHUB_ENV"
          echo "Using ROOT_DIR=$ROOT_DIR"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Rewrite settings.gradle
        run: |
          cat > "$ROOT_DIR/settings.gradle" <<'EOF'
          rootProject.name = 'ChannelsDebridTV'
          include ':app'
          EOF

      - name: Rewrite root build.gradle
        run: |
          cat > "$ROOT_DIR/build.gradle" <<'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.6.1'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.24'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Rewrite app build.gradle
        run: |
          cat > "$ROOT_DIR/app/build.gradle" <<'EOF'
          apply plugin: 'com.android.application'
          apply plugin: 'org.jetbrains.kotlin.android'

          android {
              namespace 'com.channelsdebrid.tv'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.channelsdebrid.tv'
                  minSdk 26
                  targetSdk 35
                  versionCode 1
                  versionName '1.0'
              }

              buildTypes {
                  debug {
                      minifyEnabled false
                  }
                  release {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }

              buildFeatures {
                  viewBinding true
              }
          }

          repositories {
              google()
              mavenCentral()
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.13.1'
              implementation 'androidx.appcompat:appcompat:1.7.0'
              implementation 'androidx.leanback:leanback:1.2.0'
              implementation 'androidx.media3:media3-exoplayer:1.4.1'
              implementation 'androidx.media3:media3-ui:1.4.1'
          }
          EOF

      - name: Write gradle.properties
        run: |
          cat > "$ROOT_DIR/gradle.properties" <<'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          EOF

      - name: Fix AndroidManifest package attribute
        run: |
          MANIFEST="$ROOT_DIR/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's/ package="com\.channelsdebrid\.tv"//g' "$MANIFEST" || true
          fi

      - name: Force fix XML ampersands in activity_server_setup.xml
        run: |
          XML_FILE="$ROOT_DIR/app/src/main/res/layout/activity_server_setup.xml"
          if [ ! -f "$XML_FILE" ]; then
            echo "Missing XML file: $XML_FILE"
            exit 1
          fi

          cp "$XML_FILE" "$XML_FILE.bak"

          python3 - "$XML_FILE" <<'PY'
import re
import sys
from pathlib import Path

xml_path = Path(sys.argv[1])
text = xml_path.read_text(encoding="utf-8")

# Replace any raw ampersand that is NOT already part of a valid XML entity.
text = re.sub(r'&(?!amp;|lt;|gt;|apos;|quot;|#\d+;|#x[0-9A-Fa-f]+;)', '&amp;', text)

xml_path.write_text(text, encoding="utf-8")
print(f"Patched XML: {xml_path}")
PY

          echo "===== XML lines around failure ====="
          nl -ba "$XML_FILE" | sed -n '58,70p'

      - name: Build APK with Gradle 8.7
        run: |
          cd "$ROOT_DIR"
          gradle :app:assembleDebug --stacktrace --info

      - name: Find APK
        run: |
          APK_PATH="$(find "$ROOT_DIR" -type f -path "*/build/outputs/apk/debug/*.apk" | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "APK not found"
            find "$ROOT_DIR" -type f -name "*.apk" | sort || true
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> "$GITHUB_ENV"
          cp "$APK_PATH" app-debug.apk
          ls -lh app-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: channelsdebrid-tv-apk
          path: app-debug.apk
          if-no-files-found: error