name: Build Android TV APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show repo files
        run: |
          pwd
          ls -la

      - name: Unzip source package
        run: |
          mkdir project
          unzip channelsdebrid-final-merged-github-apk-v52-backend-setup.zip -d project
          find project -maxdepth 3 -type d | sort

      - name: Detect project root
        run: |
          ROOT_DIR=$(find project -maxdepth 4 -type d -name "android-tv-client" | head -n 1)
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Build APK
        run: |
          cd "$ROOT_DIR"
          if [ ! -f "./gradlew" ]; then
            gradle wrapper
          fi
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: channelsdebrid-tv-debug-apk
          path: ${{ env.ROOT_DIR }}/app/build/outputs/apk/debug/*.apk
      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Build APK
        run: |
          cd project/*/app || true
          gradle assembleDebug || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "**/*.apk"
