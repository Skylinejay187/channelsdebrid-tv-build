name: Build Android TV APK from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ZIP_NAME: channelsdebrid-final-merged-github-apk-v52-backend-setup-fresh.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate ZIP
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "$ZIP_NAME" ]; then
            ZIP_PATH="$ZIP_NAME"
          else
            ZIP_PATH="$(find . -maxdepth 3 -type f -name '*.zip' | head -n 1 || true)"
          fi

          if [ -z "${ZIP_PATH:-}" ] || [ ! -f "$ZIP_PATH" ]; then
            echo "No ZIP file found in repository."
            ls -la
            exit 1
          fi

          echo "ZIP_PATH=$ZIP_PATH" >> "$GITHUB_ENV"
          echo "Using ZIP: $ZIP_PATH"

      - name: Extract ZIP
        shell: bash
        run: |
          set -euo pipefail
          rm -rf project
          mkdir -p project
          unzip -q "$ZIP_PATH" -d project

      - name: Locate Android project
        shell: bash
        run: |
          set -euo pipefail

          ROOT_DIR="$(find project -type f \( -name 'settings.gradle.kts' -o -name 'settings.gradle' \) | head -n 1 | xargs dirname)"

          if [ -z "${ROOT_DIR:-}" ] || [ ! -d "$ROOT_DIR" ]; then
            echo "Android project directory not found."
            find project -maxdepth 5 | sed -n '1,200p'
            exit 1
          fi

          echo "ROOT_DIR=$ROOT_DIR" >> "$GITHUB_ENV"
          echo "Android project: $ROOT_DIR"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Rewrite settings.gradle
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT_DIR"

          if [ -f "settings.gradle.kts" ]; then
            cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "ChannelsDebridTV"
          include(":app")
          EOF
          else
            cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "ChannelsDebridTV"
          include ':app'
          EOF
          fi

      - name: Rewrite root build.gradle
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT_DIR"

          if [ -f "build.gradle.kts" ]; then
            cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.6.1" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF
          else
            cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.6.1' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.24' apply false
          }
          EOF
          fi

      - name: Rewrite app build.gradle
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT_DIR"

          if [ -f "app/build.gradle.kts" ]; then
            cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.channelsdebrid.tv"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.channelsdebrid.tv"
                  minSdk = 26
                  targetSdk = 35
                  versionCode = 1
                  versionName = "0.1.0"
              }

              buildTypes {
                  debug {
                      isMinifyEnabled = false
                  }
                  release {
                      isMinifyEnabled = false
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              buildFeatures {
                  viewBinding = true
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.appcompat:appcompat:1.7.0")
              implementation("androidx.activity:activity-ktx:1.9.2")
              implementation("androidx.leanback:leanback:1.2.0")
              implementation("androidx.webkit:webkit:1.11.0")
              implementation("androidx.media3:media3-exoplayer:1.4.1")
              implementation("androidx.media3:media3-ui:1.4.1")
              implementation("androidx.media3:media3-common:1.4.1")
          }
          EOF
          else
            cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace 'com.channelsdebrid.tv'
              compileSdk 35

              defaultConfig {
                  applicationId "com.channelsdebrid.tv"
                  minSdk 26
                  targetSdk 35
                  versionCode 1
                  versionName "0.1.0"
              }

              buildTypes {
                  debug {
                      minifyEnabled false
                  }
                  release {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }

              buildFeatures {
                  viewBinding true
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.13.1'
              implementation 'androidx.appcompat:appcompat:1.7.0'
              implementation 'androidx.activity:activity-ktx:1.9.2'
              implementation 'androidx.leanback:leanback:1.2.0'
              implementation 'androidx.webkit:webkit:1.11.0'
              implementation 'androidx.media3:media3-exoplayer:1.4.1'
              implementation 'androidx.media3:media3-ui:1.4.1'
              implementation 'androidx.media3:media3-common:1.4.1'
          }
          EOF
          fi

      - name: Write gradle.properties
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT_DIR"

          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          EOF

      - name: Rewrite AndroidManifest.xml
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT_DIR"

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-feature
                  android:name="android.software.leanback"
                  android:required="true" />
              <uses-feature
                  android:name="android.hardware.touchscreen"
                  android:required="false" />

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />

              <application
                  android:allowBackup="true"
                  android:label="ChannelsDebrid TV"
                  android:theme="@style/Theme.ChannelsDebridTV"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:label="ChannelsDebrid TV"
                      android:theme="@style/Theme.ChannelsDebridTV">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <activity
                      android:name=".HomeActivity"
                      android:exported="false" />

                  <activity
                      android:name=".PlayerActivity"
                      android:exported="false"
                      android:launchMode="singleTask"
                      android:screenOrientation="landscape" />

                  <activity
                      android:name=".SettingsActivity"
                      android:exported="false" />

                  <activity
                      android:name=".ServerSetupActivity"
                      android:exported="false"
                      android:screenOrientation="landscape" />

                  <activity
                      android:name=".AppsActivity"
                      android:exported="false"
                      android:screenOrientation="landscape" />

              </application>

          </manifest>
          EOF

      - name: Fix activity_server_setup.xml
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT_DIR"

          XML_FILE="app/src/main/res/layout/activity_server_setup.xml"

          if [ -f "$XML_FILE" ]; then
            python3 <<'PY'
          from pathlib import Path
          import re

          xml_path = Path("app/src/main/res/layout/activity_server_setup.xml")
          text = xml_path.read_text(encoding="utf-8")
          text = re.sub(r'&(?!amp;|lt;|gt;|apos;|quot;|#\d+;|#x[0-9A-Fa-f]+;)', '&amp;', text)
          xml_path.write_text(text, encoding="utf-8")
          print(f"Patched XML: {xml_path}")
          PY
          fi

      - name: Rewrite AppsActivity.kt
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT_DIR"

          if [ -f "app/src/main/java/com/channelsdebrid/tv/AppsActivity.kt" ]; then
            cat > app/src/main/java/com/channelsdebrid/tv/AppsActivity.kt <<'EOF'
          package com.channelsdebrid.tv

          import android.content.Intent
          import android.content.pm.PackageManager
          import android.graphics.Color
          import android.graphics.drawable.ColorDrawable
          import android.graphics.drawable.Drawable
          import android.os.Bundle
          import android.util.TypedValue
          import android.view.Gravity
          import android.view.View
          import android.view.ViewGroup
          import android.widget.BaseAdapter
          import android.widget.GridView
          import android.widget.ImageView
          import android.widget.LinearLayout
          import android.widget.TextView
          import androidx.appcompat.app.AppCompatActivity

          class AppsActivity : AppCompatActivity() {

              data class AppEntry(
                  val label: String,
                  val packageName: String,
                  val activityName: String,
                  val icon: Drawable?
              )

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)

                  val pm = packageManager
                  val intent = Intent(Intent.ACTION_MAIN, null).apply {
                      addCategory(Intent.CATEGORY_LEANBACK_LAUNCHER)
                  }

                  val apps = pm.queryIntentActivities(intent, PackageManager.MATCH_ALL)
                      .map {
                          AppEntry(
                              label = it.loadLabel(pm).toString(),
                              packageName = it.activityInfo.packageName,
                              activityName = it.activityInfo.name,
                              icon = it.loadIcon(pm)
                          )
                      }
                      .sortedBy { it.label.lowercase() }

                  val grid = GridView(this).apply {
                      numColumns = 4
                      horizontalSpacing = dp(18)
                      verticalSpacing = dp(18)
                      stretchMode = GridView.STRETCH_COLUMN_WIDTH
                      clipToPadding = false
                      setPadding(dp(28), dp(28), dp(28), dp(28))
                      setBackgroundColor(Color.parseColor("#05070C"))
                      selector = ColorDrawable(Color.TRANSPARENT)
                      adapter = AppsAdapter(apps)
                      isFocusable = true
                      isFocusableInTouchMode = true
                  }

                  grid.setOnItemClickListener { _, _, position, _ ->
                      val app = apps[position]
                      val launch = Intent(Intent.ACTION_MAIN).apply {
                          addCategory(Intent.CATEGORY_LEANBACK_LAUNCHER)
                          setClassName(app.packageName, app.activityName)
                          addFlags(Intent.FLAG_ACTIVITY_NEW_TASK)
                      }
                      startActivity(launch)
                  }

                  setContentView(grid)
              }

              private fun dp(value: Int): Int {
                  return TypedValue.applyDimension(
                      TypedValue.COMPLEX_UNIT_DIP,
                      value.toFloat(),
                      resources.displayMetrics
                  ).toInt()
              }

              inner class AppsAdapter(private val items: List<AppEntry>) : BaseAdapter() {
                  override fun getCount(): Int = items.size
                  override fun getItem(position: Int): Any = items[position]
                  override fun getItemId(position: Int): Long = position.toLong()

                  override fun getView(position: Int, convertView: View?, parent: ViewGroup?): View {
                      val context = this@AppsActivity
                      val entry = items[position]

                      val root = if (convertView == null) {
                          LinearLayout(context).apply {
                              orientation = LinearLayout.VERTICAL
                              gravity = Gravity.CENTER_HORIZONTAL
                              setPadding(dp(14), dp(14), dp(14), dp(14))
                              setBackgroundColor(Color.parseColor("#141923"))
                              layoutParams = GridView.LayoutParams(
                                  ViewGroup.LayoutParams.MATCH_PARENT,
                                  dp(210)
                              )
                              isFocusable = true
                              isClickable = true
                          }
                      } else {
                          convertView as LinearLayout
                      }

                      root.removeAllViews()

                      val iconView = ImageView(context).apply {
                          layoutParams = LinearLayout.LayoutParams(dp(84), dp(84))
                          setImageDrawable(entry.icon)
                      }

                      val labelView = TextView(context).apply {
                          text = entry.label
                          setTextColor(Color.WHITE)
                          setTextSize(TypedValue.COMPLEX_UNIT_SP, 15f)
                          gravity = Gravity.CENTER
                          maxLines = 2
                          setPadding(0, dp(12), 0, 0)
                      }

                      root.addView(iconView)
                      root.addView(labelView)

                      root.setOnFocusChangeListener { view, hasFocus ->
                          view.scaleX = if (hasFocus) 1.06f else 1.0f
                          view.scaleY = if (hasFocus) 1.06f else 1.0f
                          view.alpha = if (hasFocus) 1.0f else 0.96f
                      }

                      return root
                  }
              }
          }
          EOF
          fi

      - name: Rewrite PlayerActivity.kt
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT_DIR"

          if [ -f "app/src/main/java/com/channelsdebrid/tv/PlayerActivity.kt" ]; then
            cat > app/src/main/java/com/channelsdebrid/tv/PlayerActivity.kt <<'EOF'
          package com.channelsdebrid.tv

          import android.net.Uri
          import android.os.Bundle
          import android.view.KeyEvent
          import android.view.View
          import android.widget.TextView
          import androidx.appcompat.app.AppCompatActivity
          import androidx.media3.common.C
          import androidx.media3.common.MediaItem
          import androidx.media3.common.PlaybackException
          import androidx.media3.common.Player
          import androidx.media3.common.Tracks
          import androidx.media3.exoplayer.ExoPlayer
          import androidx.media3.ui.PlayerView

          class PlayerActivity : AppCompatActivity() {

              private var player: ExoPlayer? = null
              private lateinit var playerView: PlayerView
              private lateinit var titleText: TextView
              private lateinit var metaText: TextView
              private lateinit var controlsHint: TextView
              private lateinit var trackHint: TextView

              private var resumeMs: Long = 0L
              private var hintVisible = true

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_player)

                  playerView = findViewById(R.id.playerView)
                  titleText = findViewById(R.id.titleText)
                  metaText = findViewById(R.id.metaText)
                  controlsHint = findViewById(R.id.controlsHint)
                  trackHint = findViewById(R.id.trackHint)

                  val title = intent.getStringExtra(EXTRA_TITLE) ?: "Native Player"
                  val url = intent.getStringExtra(EXTRA_URL) ?: ""
                  val subtitle = intent.getStringExtra(EXTRA_META) ?: "Media3 / ExoPlayer playback"
                  resumeMs = intent.getLongExtra(EXTRA_RESUME_MS, 0L)

                  titleText.text = title
                  metaText.text = subtitle
                  controlsHint.text = "DPAD center: play/pause • Left/Right: seek 10s • Up/Down: show controls"
                  trackHint.text = "Subtitles/audio selection scaffold ready for next pass"

                  if (url.isNotBlank()) {
                      initializePlayer(url, title)
                  } else {
                      metaText.text = "No playback URL supplied. Launch PlayerActivity with EXTRA_URL."
                  }
              }

              private fun initializePlayer(url: String, title: String) {
                  val exoPlayer = ExoPlayer.Builder(this).build()
                  player = exoPlayer
                  playerView.player = exoPlayer

                  val mediaItem = MediaItem.Builder()
                      .setUri(Uri.parse(url))
                      .setMediaId(title)
                      .build()

                  exoPlayer.addListener(object : Player.Listener {
                      override fun onPlaybackStateChanged(playbackState: Int) {
                          metaText.text = when (playbackState) {
                              Player.STATE_BUFFERING -> "Buffering…"
                              Player.STATE_READY ->
                                  if (resumeMs > 0L) {
                                      "Playing in native Media3 player • resumed"
                                  } else {
                                      "Playing in native Media3 player"
                                  }

                              Player.STATE_ENDED -> "Playback ended"
                              else -> metaText.text
                          }
                      }

                      override fun onPlayerError(error: PlaybackException) {
                          metaText.text = "Playback error: ${error.errorCodeName}"
                      }

                      override fun onTracksChanged(tracks: Tracks) {
                          val hasText = tracks.groups.any { group ->
                              group.type == C.TRACK_TYPE_TEXT
                          }
                          val hasAudio = tracks.groups.any { group ->
                              group.type == C.TRACK_TYPE_AUDIO
                          }

                          trackHint.text = buildString {
                              append("Audio: ")
                              append(if (hasAudio) "available" else "none")
                              append(" • Subtitles: ")
                              append(if (hasText) "available" else "none")
                          }
                      }
                  })

                  exoPlayer.setMediaItem(mediaItem)
                  exoPlayer.prepare()
                  if (resumeMs > 0L) exoPlayer.seekTo(resumeMs)
                  exoPlayer.playWhenReady = true
              }

              private fun toggleOverlay(forceShow: Boolean? = null) {
                  hintVisible = forceShow ?: !hintVisible
                  val visibility = if (hintVisible) View.VISIBLE else View.GONE
                  (titleText.parent as? View)?.visibility = visibility
              }

              override fun onKeyDown(keyCode: Int, event: KeyEvent?): Boolean {
                  val activePlayer = player ?: return super.onKeyDown(keyCode, event)

                  when (keyCode) {
                      KeyEvent.KEYCODE_DPAD_CENTER,
                      KeyEvent.KEYCODE_MEDIA_PLAY_PAUSE -> {
                          if (activePlayer.isPlaying) activePlayer.pause() else activePlayer.play()
                          return true
                      }

                      KeyEvent.KEYCODE_DPAD_LEFT -> {
                          activePlayer.seekTo((activePlayer.currentPosition - 10_000).coerceAtLeast(0))
                          return true
                      }

                      KeyEvent.KEYCODE_DPAD_RIGHT -> {
                          activePlayer.seekTo(activePlayer.currentPosition + 10_000)
                          return true
                      }

                      KeyEvent.KEYCODE_DPAD_UP,
                      KeyEvent.KEYCODE_DPAD_DOWN -> {
                          toggleOverlay()
                          return true
                      }
                  }

                  return super.onKeyDown(keyCode, event)
              }

              override fun onStart() {
                  super.onStart()
                  player?.playWhenReady = true
              }

              override fun onStop() {
                  player?.playWhenReady = false
                  super.onStop()
              }

              override fun onDestroy() {
                  playerView.player = null
                  player?.release()
                  player = null
                  super.onDestroy()
              }

              companion object {
                  const val EXTRA_URL = "extra_url"
                  const val EXTRA_TITLE = "extra_title"
                  const val EXTRA_META = "extra_meta"
                  const val EXTRA_RESUME_MS = "extra_resume_ms"
              }
          }
          EOF
          fi

      - name: Ensure Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT_DIR"

          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi

          chmod +x ./gradlew

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT_DIR"
          ./gradlew :app:assembleDebug --stacktrace --info

      - name: Copy APK to fixed artifact name
        shell: bash
        run: |
          set -euo pipefail

          APK_PATH="$(find "$ROOT_DIR/app/build/outputs/apk" -type f -name '*.apk' | head -n 1 || true)"

          if [ -z "${APK_PATH:-}" ] || [ ! -f "$APK_PATH" ]; then
            echo "APK not found."
            find "$ROOT_DIR/app/build" -maxdepth 6 -type f | sed -n '1,200p' || true
            exit 1
          fi

          echo "Found APK: $APK_PATH"
          cp "$APK_PATH" "$GITHUB_WORKSPACE/channelsdebrid-tv-debug.apk"
          ls -lh "$GITHUB_WORKSPACE/channelsdebrid-tv-debug.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: channelsdebrid-tv-debug-apk
          path: ${{ github.workspace }}/channelsdebrid-tv-debug.apk
          if-no-files-found: error
          overwrite: true
          retention-days: 7
