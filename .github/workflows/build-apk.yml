name: Build APK From ZIP

on:
  workflow_dispatch:
  push:
    paths:
      - '**.zip'
      - '.github/workflows/**.yml'
      - '.github/workflows/**.yaml'

jobs:
  build-apk-from-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip findutils

      - name: Find project ZIP
        id: zip
        shell: bash
        run: |
          set -euo pipefail

          ZIP_FILE=""

          # Prefer the newest zip in repo root, then anywhere in repo
          if ls -1t ./*.zip >/dev/null 2>&1; then
            ZIP_FILE="$(ls -1t ./*.zip | head -n 1)"
          else
            ZIP_FILE="$(find . -type f -name '*.zip' | sort | tail -n 1)"
          fi

          if [ -z "${ZIP_FILE}" ] || [ ! -f "${ZIP_FILE}" ]; then
            echo "No ZIP file found in repository."
            exit 1
          fi

          echo "Using ZIP: ${ZIP_FILE}"
          echo "zip_file=${ZIP_FILE}" >> "$GITHUB_OUTPUT"

      - name: Extract ZIP
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          rm -rf extracted_project
          mkdir -p extracted_project
          unzip -q "${{ steps.zip.outputs.zip_file }}" -d extracted_project
          echo "extract_dir=extracted_project" >> "$GITHUB_OUTPUT"

      - name: Find Android Gradle root inside extracted ZIP
        id: gradle_root
        shell: bash
        run: |
          set -euo pipefail

          SEARCH_ROOT="${{ steps.extract.outputs.extract_dir }}"

          ROOT="$(find "$SEARCH_ROOT" -type f \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) -print0 \
            | xargs -0 -I{} dirname "{}" \
            | while read -r d; do
                if [ -d "$d/app" ] || find "$d" -maxdepth 2 -type f -name 'build.gradle' -o -name 'build.gradle.kts' | grep -q .; then
                  echo "$d"
                fi
              done \
            | head -n 1)"

          if [ -z "${ROOT}" ]; then
            ROOT="$(find "$SEARCH_ROOT" -type f -name 'gradlew' -print0 | xargs -0 -I{} dirname "{}" | head -n 1)"
          fi

          if [ -z "${ROOT}" ] || [ ! -d "${ROOT}" ]; then
            echo "Could not find Android Gradle project root inside extracted ZIP."
            find "$SEARCH_ROOT" -maxdepth 4 -type f | sed 's#^#FOUND: #' | head -n 200
            exit 1
          fi

          echo "Gradle root: ${ROOT}"
          echo "root=${ROOT}" >> "$GITHUB_OUTPUT"

      - name: Ensure Gradle wrapper exists
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.gradle_root.outputs.root }}"

          if [ ! -f ./gradlew ]; then
            echo "gradlew not found, generating wrapper"
            if command -v gradle >/dev/null 2>&1; then
              gradle wrapper
            else
              sudo apt-get update
              sudo apt-get install -y gradle
              gradle wrapper
            fi
          fi

          chmod +x ./gradlew

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.gradle_root.outputs.root }}"
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: channels-debrid-debug-apk
          path: |
            ${{ steps.gradle_root.outputs.root }}/app/build/outputs/apk/debug/*.apk
            ${{ steps.gradle_root.outputs.root }}/**/build/outputs/apk/debug/*.apk
          if-no-files-found: error
